# Phase 1 pilot: 350M model + ~1% data, 1 epoch (docs/lfm2_5-ja-plan.md Phase 1)
# NOTE: LFM2.5 ファミリに 350M は無いため LFM2-350M を使用(設計書 §1.2 の 350M 行と整合)
model_name: LiquidAI/LFM2-350M

max_seq_len: 1024

tuning:
  method: full_layer
  trainable_layer_indices: [15]   # LFM2-350M も 16 層(要確認だが 0-based 最終層)

training:
  num_train_epochs: 1
  learning_rate: 1.0e-4

dataset:
  train_path: data/processed/mixture.jsonl
  sample_fraction: 0.01

logging:
  run_name_prefix: cpt-350m-pilot
