# Phase 2 cpt-B 実験用の雛形(docs/lfm2_5-ja-plan.md Phase 2, 表の cpt-B 行)。
# 1.2B-Base + 日本語 CPT(選択層のフルパラメータ FT, ~1B トークン想定)→ 後段で SFT。
# 350M パイロット(cpt_350m_pilot.yaml)の結果を踏まえて trainable_layer_indices /
# training / dataset を調整してから実行すること。
model_name: LiquidAI/LFM2.5-1.2B-Base

# WSL2/Linux (flash SDP) 実測上限。Windows ネイティブでは 2048 に下げること (Issue #64)。
max_seq_len: 6144

tuning:
  method: full_layer
  # arXiv:2607.01232 §4.3 の中央層ヒューリスティック(L=16 -> 中央 k=2 は
  # [floor(16/2-1), floor(16/2+1)) = [7, 9) = [7, 8])。本番 CPT は k=1 の
  # base.yaml より少し広く取り、寄与の高い中央帯を厚めにカバーする。
  trainable_layer_indices: [7, 8]

training:
  num_train_epochs: 1
  learning_rate: 1.0e-4  # 大規模 CPT (~1B トークン) の安定側に調整
  save_steps: 1000

dataset:
  train_path: data/processed/mixture.jsonl
  sample_fraction: 1.0

logging:
  run_name_prefix: cpt-1.2b-layerft
