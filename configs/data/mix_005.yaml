# sft-005 distill selection + mix (Issue #109).
#
# sft-002-mix (Issue #105) regressed hard on ifeval_ja prompt_strict
# (base -18pt): the diagnosed root cause was an off-policy style shift --
# the training mixture averaged 284 chars/response vs. the base model's own
# ~176 chars/response. sft-005 re-attempts SFT with:
#   - distill: rows *selected* (not newly generated -- see data provenance
#     note below) from a pre-generated CSV, kept only if they pass the same
#     rule-based verifier the ifeval_ja eval harness uses to score that
#     constraint type (lfm25_ja.eval.instruction_verifiers.VERIFIERS, reused
#     as-is), plus a tight 60-90%-of-max length band for char_count/compound
#     and a set of degenerate-output filters.
#   - ichikara: the existing ichikara-instruction-003 dataset, unchanged
#     from sft-002-mix, all rows (no llm-jp-instruct / aya-ja / other
#     free-form data, which is what drove the length/style shift).
#
# Two hard gates run after selection, before the mixture is written:
#   - response length guard: the *distill* portion's mean response length
#     must fall within base_mean_chars * (1 +/- tolerance).
#   - eval non-duplication: no accepted char_count/compound row's `max` may
#     equal a value used by datasets/eval/ifeval_ja/prompts.jsonl's own
#     char_count kwargs, and no CSV `topic` may appear as a substring of any
#     eval prompt. (select_row() already excludes the offending max values
#     proactively during selection, so this is a defense-in-depth check, not
#     expected to reject the whole run on the real CSV.)
#
# Data provenance: the distillation CSV (datasets/sft/sft005_distill_
# candidateB_prompts.csv, 4,000 rows) is a prior-session artifact adopted per
# explicit user instruction -- no model inference runs anywhere in this
# pipeline. Its responses were built by a rule-based sentence-bank composer
# (gen.py) over a fixed topic bank, NOT Qwen3-Swallow 8B (or any other model)
# inference output. See experiments/reports/phase3_sft005_distill_stats.md
# (generated by lfm25_ja.data.distill_select.prepare_distill_mix) for the
# exact acceptance/rejection breakdown and CSV md5 once the pipeline is run.

mix:
  seed: 42
  source_csv: datasets/sft/sft005_distill_candidateB_prompts.csv
  ichikara_path: data/processed/sft/ichikara.jsonl
  eval_prompts_path: datasets/eval/ifeval_ja/prompts.jsonl
  output_path: data/processed/sft/mix_005.jsonl
  stats_report: experiments/reports/phase3_sft005_distill_stats.md
  length_guard:
    base_mean_chars: 176
    tolerance: 0.20
  tight_margin:
    min_ratio: 0.60
    max_ratio: 0.90
