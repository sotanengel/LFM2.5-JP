# Phase 1 パイロット用の小規模コーパス定義 (Issue #23)
# 本番の corpus.yaml と同じパイプラインを、ダウンロードが軽い小規模データで通す。
# (wikipedia/cc100 はフルダウンロードが数十 GB になるためパイロットでは使わない)
cache_dir: data/raw

corpora:
  - name: aozora
    hf_id: globis-university/aozorabunko-clean
    split: train
    language: ja
  - name: wikitext_en   # 忘却防止用 EN 混合の供給源(パイロットでは wikitext で代用)
    hf_id: Salesforce/wikitext
    hf_config: wikitext-103-raw-v1
    split: train
    language: en

clean:
  min_chars: 50
  max_chars: 50000
  lang_threshold: 0.5
  minhash:
    num_perm: 128
    threshold: 0.8
    ngram: 5
  contamination:
    ngram: 13
    threshold: 0.5

mix:
  seed: 42
  ratios:
    ja: 0.85
    en: 0.15
  unit: documents
