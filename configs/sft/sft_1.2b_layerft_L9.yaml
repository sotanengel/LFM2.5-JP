# sft-003 層ablation の一角(単層 L9)。issue #32/#35、詳細は
# experiments/reports/phase2_gate_and_next_steps.md §4.1 および
# experiments/reports/phase2_layer_profiling.md を参照。
# Phase 2 層プロファイリングで単層最良だった L9(ppl 8.876)を採用。
# データ・学習条件は sft-001(configs/sft/sft_001_ichikara.yaml)と等価。
# 本 config は再実行せず sft-001 の完走モデル(outputs/sft-001-ichikara/)を
# sft-003 の「単層 L9」アームとして流用する(#33 受け入れ条件どおり)。
# ベースモデルは Phase 2 ゲート決定(cpt-C ルート)に基づき公式 JP 事前学習
# チェックポイントを使用する。
model_name: LiquidAI/LFM2.5-1.2B-JP-202606

tuning:
  method: full_layer
  trainable_layer_indices: [9]

training:
  num_train_epochs: 2
  learning_rate: 1.0e-4

dataset:
  train_path: data/processed/sft/ichikara.jsonl

logging:
  run_name_prefix: sft-1.2b-layerft-L9
