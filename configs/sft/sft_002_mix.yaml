# sft-002 mix (Issue #105). L9 単層 / lr1e-5 / 1ep = sft-004 A の凍結条件。
# データのみ mix_002.jsonl。決定規則: base ±3pt で 3 分岐(#105 参照)。
model_name: LiquidAI/LFM2.5-1.2B-JP-202606

tuning:
  method: full_layer
  trainable_layer_indices: [9]

training:
  num_train_epochs: 1
  learning_rate: 1.0e-5

dataset:
  train_path: data/processed/sft/mix_002.jsonl

logging:
  run_name_prefix: sft-002-mix
