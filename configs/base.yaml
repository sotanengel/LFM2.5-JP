# LFM2.5-JA common configuration
# Experiments = one YAML file per run (override this base).

model_name: LiquidAI/LFM2.5-1.2B-Instruct
base_model_name: LiquidAI/LFM2.5-1.2B-Base
baseline_jp_model: LiquidAI/LFM2.5-1.2B-JP-202606

seed: 42
precision: bf16
# 実測上限 (EXPERIMENT_LOG probe-004/005):
#   WSL2/Linux (flash SDP あり): 全 attend 6144×batch1 = 7.12 GiB — この値を採用
#   Windows ネイティブ (math SDPA に落ちる): 2048×batch1 = 4.5 GiB が実効上限
# 学習は WSL2 上での実行を前提とする (Issue #64)。Windows で回す場合は 2048 に下げること。
max_seq_len: 6144

output_dir: outputs
data_dir: data

# Layer-selective full-parameter fine-tuning (see arXiv:2607.01232 "Is One
# Layer Enough?")
tuning:
  method: full_layer
  # Layer indices (0-based) to unfreeze; all other params stay frozen.
  # arXiv:2607.01232 §4.3 の中央層ヒューリスティック: L 層モデルでは中央 k 層
  # [floor(L/2-k/2), floor(L/2+k/2)) が学習寄与を集中的に持つ(プロファイリング
  # 不要、モデル横断で一貫)。LFM2.5-1.2B は L=16 -> k=1 で中央層は [7]。
  # 旧デフォルト [15](出力端の最終層)は論文的に寄与が低い選択なので変更した。
  trainable_layer_indices: [7]

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_train_epochs: 1
  max_steps: -1
  logging_steps: 5
  save_steps: 100
  warmup_ratio: 0.03
  gradient_checkpointing: true
  optim: paged_adamw_8bit

smoke_test:
  max_steps: 20
  max_seq_len: 512

memory_probe:
  seq_lengths: [1024, 2048, 4096, 6144]
  batch_sizes: [1, 2, 4]
  n_trainable_layers: [1, 2]
  start_layer: 8

logging:
  report_to: tensorboard
  run_name_prefix: phase0
