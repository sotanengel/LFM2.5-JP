# LFM2.5-JA common configuration
# Experiments = one YAML file per run (override this base).

model_name: LiquidAI/LFM2.5-1.2B-Instruct
base_model_name: LiquidAI/LFM2.5-1.2B-Base
baseline_jp_model: LiquidAI/LFM2.5-1.2B-JP-202606

seed: 42
precision: bf16
max_seq_len: 1024

output_dir: outputs
data_dir: data

# Layer-selective full-parameter fine-tuning (see arXiv:2607.01232)
tuning:
  method: full_layer
  # Layer indices (0-based) to unfreeze; all other params stay frozen
  trainable_layer_indices: [15]

training:
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  num_train_epochs: 1
  max_steps: -1
  logging_steps: 5
  save_steps: 100
  warmup_ratio: 0.03
  gradient_checkpointing: true
  optim: paged_adamw_8bit

smoke_test:
  max_steps: 20
  max_seq_len: 512

memory_probe:
  seq_lengths: [1024, 2048, 4096]
  batch_sizes: [1, 2, 4]
  n_trainable_layers: [1, 2, 4]

logging:
  report_to: tensorboard
  run_name_prefix: phase0
